version: "3.9"

# Tundra Connection — Local development stack
# Spec: Orquestor.md §FASE 1 + ARCHITECTURE.md
# - Postgres 16 (mirror de Neon en prod)
# - Backend FastAPI con hot-reload
# - Nginx como reverse proxy (front estático opcional + headers de seguridad)

services:
  db:
    image: postgres:16-alpine
    container_name: tundra-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tundra
      POSTGRES_PASSWORD: tundra_dev
      POSTGRES_DB: tundra_connection
    ports:
      - "5432:5432"
    volumes:
      - tundra_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tundra -d tundra_connection"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - tundra_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tundra-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://tundra:tundra_dev@db:5432/tundra_connection
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-me-min-64-chars-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx}
      ENVIRONMENT: development
      FRONTEND_URL: http://localhost:5173
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8000/auth/google/callback}
      IMGBB_API_KEY: ${IMGBB_API_KEY:-}
      GRAFANA_URL: ${GRAFANA_URL:-}
      GRAFANA_SERVICE_ACCOUNT_TOKEN: ${GRAFANA_SERVICE_ACCOUNT_TOKEN:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@tundraconnection.com}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - tundra_uploads:/app/uploads
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - tundra_net

  nginx:
    image: nginx:1.27-alpine
    container_name: tundra-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - tundra_net

volumes:
  tundra_pg_data:
  tundra_uploads:

networks:
  tundra_net:
    driver: bridge
